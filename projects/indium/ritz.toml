# Indium Distribution - Ritz Build Configuration
#
# Indium is the distribution built on the Harland microkernel.
# This config defines userspace programs that run on Harland.

[package]
name = "indium"
version = "0.1.0"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
description = "Distribution built on the Harland microkernel"
repository = "https://github.com/ritz-lang/indium"

# Source directories for import resolution
sources = ["user"]

# ============================================================================
# Userspace Programs (kernel development helpers - no runtime)
# ============================================================================

# Minimal syscall test (for kernel development)
[[bin]]
name = "minimal_syscall"
entry = "minimal_syscall::main"
target = "x86_64-unknown-none"
sources = ["user"]
freestanding = true

[bin.minimal_syscall.linker]
script = "user/linker.ld"

[bin.minimal_syscall.flags]
code-model = "large"

# Portable getpid test (for kernel development)
[[bin]]
name = "portable_getpid"
entry = "portable_getpid::main"
target = "x86_64-unknown-none"
sources = ["user"]
freestanding = true

[bin.portable_getpid.linker]
script = "user/linker.ld"

[bin.portable_getpid.flags]
code-model = "large"

# ============================================================================
# Core System Programs (with runtime - _start calls main and sys_exit)
# ============================================================================

[[bin]]
name = "init"
entry = "init::main"
target = "x86_64-unknown-none"
target_os = "harland"
sources = ["user"]
freestanding = true
link_runtime = true
main_args = 0

[bin.init.linker]
script = "user/linker_pie.ld"

[bin.init.flags]
pic = true

