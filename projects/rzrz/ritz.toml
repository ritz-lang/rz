# rzrz - rz written in Ritz
#
# The unified workspace CLI for building, testing, and running
# Ritz projects. Replaces the Python script with a native Ritz binary.
#
# "rz in rz" = rzrz (like "bash in bash" but better)

[package]
name = "rzrz"
version = "0.1.0"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
description = "Unified workspace CLI for the Ritz ecosystem (rz in Ritz)"
repository = "https://github.com/ritz-lang/rz"

sources = ["src"]

[[bin]]
name = "rzrz"
entry = "main::main"
target = "x86_64-unknown-linux-gnu"
target_os = "linux"
link_runtime = true
main_args = 3

[dependencies]
# Note: ritzlib has files directly in the directory, not in src/
ritzlib = { path = "../ritz/ritzlib", sources = ["."] }

[test]
host-target = "x86_64-linux"
sources = ["test"]
