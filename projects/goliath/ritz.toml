[package]
name = "goliath"
version = "0.1.0"
description = "Content-addressable filesystem for Harland"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
repository = "https://github.com/ritz-lang/goliath"

# Library sources
sources = ["src"]

# Dependencies - using RITZ_PATH flat structure
[dependencies]
# cryptosec = { path = "../cryptosec" }  # SHA-256 (when ready)
# squeeze = { path = "../squeeze" }       # LZ4 compression (G4)

# Library definition
[[lib]]
name = "goliath"

# Test binary - uses ritzunit
[[bin]]
name = "goliath-tests"
entry = "test_main::main"
sources = ["src", "test"]

# Individual test modules (discovered by ritzunit)
[[test]]
name = "test-blob-id"
entry = "test_blob_id"

[[test]]
name = "test-blob-store"
entry = "test_blob_store"

[[test]]
name = "test-namespace"
entry = "test_namespace"

[[test]]
name = "test-path"
entry = "test_path"
