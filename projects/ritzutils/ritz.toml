# ritzutils - Coreutils-style utilities for Ritz
#
# A collection of essential command-line utilities for the Indium distribution.
# These are standalone binaries that work with shell pipelines.

[package]
name = "ritzutils"
version = "0.1.0"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
description = "Coreutils-style utilities for Ritz"
repository = "https://github.com/ritz-lang/rz"

# Source directories for import resolution
sources = ["src"]

# ============================================================================
# cat - Concatenate and display files
# ============================================================================

[[bin]]
name = "cat"
entry = "cat::main"
target = "x86_64-unknown-none"
target_os = "harland"
sources = ["src"]
freestanding = true
link_runtime = true
main_args = 2

[bin.cat.linker]
script = "../indium/user/linker_pie.ld"

[bin.cat.flags]
pic = true
