# Tempest - Web Browser
#
# Multi-process browser architecture:
# - Browser process: UI, tabs, navigation, network
# - Tab processes: DOM, JS execution (Sage), rendering (Iris)
#
# Dependencies:
# - http: HTTP/1-3 protocol implementation
# - cryptosec: TLS 1.3 for HTTPS
# - squeeze: Content-Encoding (gzip, deflate)
# - lexis: HTML/CSS parsing
# - iris: Rendering engine
# - sage: JavaScript engine
# - prism: Display server integration

[package]
name = "tempest"
version = "0.1.0"
description = "Web browser built on the Ritz ecosystem"

[dependencies]
ritz = { path = "../ritz" }
http = { path = "../http" }
cryptosec = { path = "../cryptosec" }
squeeze = { path = "../squeeze" }
lexis = { path = "../lexis" }
iris = { path = "../iris" }
sage = { path = "../sage" }
prism = { path = "../prism" }

[dev-dependencies]
ritzunit = { path = "../ritz/ritzunit" }

[build]
entry = "src/main.ritz"
output = "tempest"

# Browser process binary
[[bin]]
name = "tempest"
path = "src/main.ritz"

# Tab renderer process (spawned per tab)
[[bin]]
name = "tempest-tab"
path = "src/tab_process.ritz"
