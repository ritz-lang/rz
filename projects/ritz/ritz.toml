[package]
name = "ritz"
version = "0.1.0-alpha"
authors = ["Aaron Sinclair <aaron.sinclair@bettercomp.com>"]
edition = "2024"
description = "Ritz programming language - Systems programming with modern ergonomics"
repository = "https://github.com/ritz-lang/ritz"
license = "MIT"

[workspace]
members = [
    "ritz0",     # Python bootstrap compiler
    "ritz1",     # Self-hosted compiler (ritz-in-ritz)
    "examples"   # Example programs (Tier 1-8)
]

# Bootstrap compiler (Python)
[[bin]]
name = "ritz0"
path = "ritz0/ritz0.py"

# Self-hosted compiler
[[bin]]
name = "ritz1"
path = "ritz1/compile.sh"

[dependencies]
# None - we're bootstrapping from scratch!

[dev-dependencies]
# TBD - test framework will be written in Ritz

[build]
# Build commands
build = "make all"
test = "make test"
clean = "make clean"

[scripts]
# Development scripts
ab-test = "scripts/ab_test.sh"
build-ritz0 = "make ritz0"
build-ritz1 = "./ritz1/compile.sh"
test-all = "make test"
valgrind = "make valgrind"

[features]
default = []
debug = []      # Enable debug output
optimize = []   # Optimization passes

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
debug = false
lto = true

# Example programs configuration
[examples]
tier1 = ["01_hello", "02_exitcode", "03_echo", "04_true_false", "05_cat", "06_head", "07_wc", "08_seq", "09_yes", "10_sleep"]
tier2 = ["11_tac", "12_sort", "13_uniq", "14_rev", "15_cut", "16_tr", "17_expand", "18_nl", "19_base64", "20_xxd"]
tier3 = ["21_ls", "22_mkdir", "23_rm", "24_cp", "25_mv", "26_touch", "27_stat", "28_chmod", "29_du", "30_find"]

[metadata]
# Project metadata for tooling
language-version = "0.1"
bootstrap-compiler = "ritz0"
self-hosted-compiler = "ritz1"
target-compiler = "ritz2"
