[package]
name = "hello"
version = "0.1.0"

# RFC #109: Source discovery - directory expands to **/*.ritz
sources = ["src"]

# RFC #109: Binary target with entry point syntax
[[bin]]
name = "hello"
entry = "main::main"    # src/main.ritz, fn main()

[profile.debug]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
debug = false
