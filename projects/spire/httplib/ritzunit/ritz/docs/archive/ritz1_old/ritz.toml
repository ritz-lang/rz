[package]
name = "ritz1"
version = "0.1.0"
description = "Self-hosting Ritz compiler written in Ritz"

[[bin]]
name = "ritz1"
src = "src/main.ritz"

# Library sources in dependency order (for multi-file compilation)
# Note: types.ritz, symbols.ritz, borrow.ritz, checker.ritz have duplicate
# struct definitions for isolated testing. Once import/modules are supported,
# they can be unified and added here.
[build]
libs = [
  "src/mem.ritz",
  "src/utf8.ritz",
  "src/nfa.ritz",
  "src/regex.ritz",
  "src/tokens.ritz",
  "src/token_dsl.ritz",
  "src/lexer.ritz",
  "src/ritz_tokens.ritz",
  "src/parser.ritz",
  "src/emitter.ritz",
]
