# Harland Microkernel - Ritz Build Configuration
#
# This is a multi-target project:
#   - kernel: freestanding x86-64 ELF
#   - boot: UEFI PE/COFF application
#   - user: standard Ritz programs (for testing)

[package]
name = "harland"
version = "0.1.0"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
description = "A microkernel written in Ritz, designed for portability and clean syscall abstraction"
repository = "https://github.com/ritz-lang/harland"

# Source directories for import resolution
sources = ["kernel/src"]

# ============================================================================
# User Space Programs (for testing)
# ============================================================================
# NOTE: Must be built BEFORE kernel, as kernel embeds portable_getpid.elf

[[bin]]
name = "minimal_syscall"
entry = "minimal_syscall::main"
target = "x86_64-unknown-none"
sources = ["user"]
freestanding = true

[bin.minimal_syscall.linker]
script = "user/linker.ld"

[bin.minimal_syscall.flags]
code-model = "large"

[[bin]]
name = "portable_getpid"
entry = "portable_getpid::main"
target = "x86_64-unknown-none"
sources = ["user"]
freestanding = true

[bin.portable_getpid.linker]
script = "user/linker.ld"

[bin.portable_getpid.flags]
code-model = "large"

[[bin]]
name = "init"
entry = "init::main"
target = "x86_64-unknown-none"
sources = ["user"]
freestanding = true

[bin.init.linker]
script = "user/linker_pie.ld"

[bin.init.flags]
# PIE: Position-Independent Executable - can be loaded at any address
pic = true

[[bin]]
name = "hello"
entry = "hello::main"
target = "x86_64-unknown-none"
sources = ["user"]
freestanding = true

[bin.hello.linker]
# PIE: Position-Independent Executable - can be loaded at any address
script = "user/linker_pie.ld"

[bin.hello.flags]
pic = true

# ============================================================================
# Kernel Build
# ============================================================================

[[bin]]
name = "harland"
entry = "main::kernel_main"
target = "x86_64-none-elf"
freestanding = true

[bin.harland.linker]
script = "kernel/linker.ld"

[bin.harland.flags]
no-red-zone = true
code-model = "kernel"

# Additional assembly files to link
[bin.harland.asm]
files = [
    "kernel/boot.s",
    "kernel/isr_stubs.s",
    "kernel/ap_trampoline.s",
    "kernel/context_switch.s",
    "kernel/syscall_entry.s",
    "kernel/user_program.s",
    "kernel/user_elf.s"
]

# ============================================================================
# UEFI Bootloader Build
# ============================================================================

[[bin]]
name = "bootx64"
entry = "main::efi_main"
target = "x86_64-unknown-uefi"
freestanding = true
sources = ["boot/src"]

[bin.bootx64.linker]
script = "boot/linker.ld"
subsystem = "efi_application"

# ============================================================================
# Test Configuration
# ============================================================================

[test]
# Unit tests run on host Linux
host-target = "x86_64-linux"
sources = ["tests"]

# Integration tests run in QEMU
[test.qemu]
enabled = true
timeout = 30
check-serial = "ALL TESTS PASSED"
