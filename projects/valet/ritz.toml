[package]
name = "valet"
version = "0.1.0"

# Source roots - directory expands to **/*.ritz
sources = ["src", "lib"]

[[bin]]
name = "valet"
entry = "main::main"

# Dependencies - each gets namespaced import
# Note: ritzlib is implicit (ships with compiler/found via symlink)
[dependencies]
squeeze = { path = "../squeeze" }
cryptosec = { path = "../cryptosec" }

[profile.debug]
opt-level = 2  # O0/O1 crash LLVM 20's DAG combiner (ubuntu bug)
debug = true

[profile.release]
opt-level = 2
debug = true
