[package]
name = "valet"
version = "0.1.0"
description = "High-performance HTTP server framework for Ritz"

# Source roots - directory expands to **/*.ritz
sources = ["src", "lib"]

[build]
target = "x86_64-linux"
test = true

[[bin]]
name = "valet"
entry = "main::main"

# Dependencies - each gets namespaced import
[dependencies]
ritzlib = { path = "../ritz/ritzlib", sources = ["."] }
squeeze = { path = "../squeeze", sources = ["lib"] }
cryptosec = { path = "../cryptosec", sources = ["lib"] }
# mausoleum integration is blocked on a ritzlib net/async_net duplicate-symbols
# bug — both modules export `sys_listen`, `sys_accept`, etc. as `pub`, and they
# can't be linked into the same binary. See docs/RITZLIB_NET_DEDUP.md for the
# fix sketch. Once that's resolved, re-add:
#   mausoleum = { path = "../mausoleum", sources = ["lib"] }

[profile.debug]
opt-level = 2  # O0/O1 crash LLVM 20's DAG combiner (ubuntu bug)
debug = true

[profile.release]
opt-level = 2
debug = true
