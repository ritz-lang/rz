[package]
name = "ritzunit"
version = "0.1.0"
authors = ["Aaron Sinclair <aaron.sinclair@bettercomp.com>"]
description = "A modern unit testing framework for Ritz projects"

# RFC #109: source discovery — directory expands to **/*.ritz under src/.
sources = ["src"]

# Was test_only=true; we now ship a `ritzunit` binary so build.py can
# fork+exec it as a faster test driver than `ritz0 --test`.
[[bin]]
name = "ritzunit"
entry = "bin_main::main"

[[lib]]
name = "ritzunit"

[build]
target = "x86_64-linux"

[dependencies]
# ritzlib is a directory of .ritz modules at the dep path (no nested src/),
# so we override the default sources=["src"] to point at the dep root.
ritzlib = { path = "../ritz/ritzlib", sources = ["."] }
