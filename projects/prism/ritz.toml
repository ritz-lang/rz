[package]
name = "prism"
version = "0.1.0"
description = "Display server and window compositor for Harland"

sources = ["src"]

# Main prism binary temporarily disabled while angelo dependency is being fixed
# [[bin]]
# name = "prism"
# entry = "main::main"

# Minimal demo binary for testing graphics on Harland
[[bin]]
name = "prism_demo"
entry = "demo::main"
target = "x86_64-unknown-none"
target_os = "harland"
freestanding = true
link_runtime = true
main_args = 0

[bin.prism_demo.linker]
script = "linker_pie.ld"

[bin.prism_demo.flags]
pic = true

# Graphical Hello World demo with bitmap font
[[bin]]
name = "hello_gfx"
entry = "hello_gfx::main"
target = "x86_64-unknown-none"
target_os = "harland"
freestanding = true
link_runtime = true
main_args = 0

[bin.hello_gfx.linker]
script = "linker_pie.ld"

[bin.hello_gfx.flags]
pic = true

# Dependencies temporarily disabled while angelo is being fixed
# [dependencies]
# angelo = { path = "../angelo" }
