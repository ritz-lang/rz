[package]
name = "tome"
version = "0.1.0"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
description = "In-memory data store for Ritz. Think Redis, but embedded."

[build]
target = "x86_64-linux"

# Source roots
sources = ["lib", "test", "bin"]

# Binaries
[[bin]]
name = "tome-server"
entry = "bin.tome_server::main"

[[bin]]
name = "tome-cli"
entry = "bin.tome_cli::main"

[[bin]]
name = "run-tests"
entry = "test.run_tests::main"

# Dependencies - use flat ecosystem via RITZ_PATH
[dependencies]
# ritzlib is found automatically via RITZ_PATH

[profile.debug]
opt-level = 2
debug = true

[profile.release]
opt-level = 2
debug = true
