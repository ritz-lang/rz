[package]
name = "zeus"
version = "0.1.0"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
description = "Zero-copy process runner with shared memory ring buffer IPC"

sources = ["src", "lib", "test"]

[[bin]]
name = "zeus"
entry = "main::main"

[[lib]]
name = "zeus"

[build]
target = "x86_64-linux"

# Dependencies
[dependencies]
ritzlib = { path = "../ritz/ritzlib", sources = ["."] }
ritzunit = { path = "../ritzunit" }
# Self-reference for internal imports when used as dependency
zeus = { path = ".", sources = ["lib"] }

[profile.debug]
opt-level = 2
debug = true

[profile.release]
opt-level = 2
debug = true
