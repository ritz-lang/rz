[package]
name = "zeus"
version = "0.1.0"
authors = ["Aaron Sinclair <nevelis@gmail.com>"]
description = "Zero-copy process runner with shared memory ring buffer IPC"

sources = ["lib", "test"]

[[lib]]
name = "zeus"

[build]
target = "x86_64-linux"

# Dependencies
[dependencies]
ritzunit = { path = "../ritzunit" }

[profile.debug]
opt-level = 2
debug = true

[profile.release]
opt-level = 2
debug = true
