[package]
name = "iris"
version = "0.1.0"
description = "Rendering engine for layout, painting, and compositing"

sources = ["src", "lib"]

[[bin]]
name = "iris"
entry = "main::main"

[dependencies]
prism = { path = "../prism" }
angelo = { path = "../angelo" }

[profile.debug]
opt-level = 2
debug = true

[profile.release]
opt-level = 2
debug = false
