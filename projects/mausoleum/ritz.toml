[package]
name = "mausoleum"
version = "0.1.0"

# Source roots - directory expands to **/*.ritz
sources = ["src", "lib", "test", "tools"]

[[bin]]
name = "mausoleum"
entry = "main::main"

[[bin]]
name = "test_storage"
entry = "test_storage_main::main"

[[bin]]
name = "test_integration"
entry = "test_integration::main"

[[bin]]
name = "wiki-seed"
entry = "wiki_seed::main"

[[bin]]
name = "concurrent_bench"
entry = "concurrent_bench::main"

# Dependencies
[dependencies]
ritzlib = { path = "../ritz/ritzlib", sources = ["."] }
cryptosec = { path = "../cryptosec" }
squeeze = { path = "../squeeze", sources = ["lib"] }
# Self-reference for internal imports when used as dependency
mausoleum = { path = ".", sources = ["lib"] }

[profile.debug]
opt-level = 2  # O0/O1 crash LLVM 20's DAG combiner (ubuntu bug)
debug = true

[profile.release]
opt-level = 2
debug = true
