[package]
name = "nexus"
version = "0.1.0"
description = "The Ritz Knowledge Base - Documentation and wiki platform"

sources = ["src"]

[[bin]]
name = "nexus"
entry = "main::main"

[profile.debug]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
debug = false

