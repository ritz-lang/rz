[package]
name = "nexus"
version = "0.1.0"
description = "The Ritz Knowledge Base - Wiki application built on the Ritz stack"

sources = ["src"]

[[bin]]
name = "nexus"
entry = "main::main"

[profile.debug]
opt-level = 2  # O0/O1 crash LLVM 20's DAG combiner
debug = true

[profile.release]
opt-level = 3
debug = false

[dependencies]
ritzlib = { path = "../ritz/ritzlib", sources = ["."] }
zeus = { path = "../zeus", sources = ["lib"] }
squeeze = { path = "../squeeze", sources = ["lib"] }
cryptosec = { path = "../cryptosec", sources = ["lib"] }
mausoleum = { path = "../mausoleum", sources = ["lib"] }
spire = { path = "../spire", sources = ["lib"] }

# TODO: Add when cache integration is ready
# tome = { path = "../tome", sources = ["lib"] }
