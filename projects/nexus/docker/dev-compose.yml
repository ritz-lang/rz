# Nexus Development Compose
#
# Development setup with real Nexus binary!
#
# Usage:
#   # Build nexus first
#   python3 ritz/build.py build . --release
#
#   # Then run with docker compose
#   cd docker
#   docker compose -f dev-compose.yml up -d
#   curl http://localhost:8080/
#   curl http://localhost:8080/health

version: '3.8'

services:
  # ============================================================================
  # Mock Mausoleum - Redis standing in for document storage
  # ============================================================================
  mausoleum-mock:
    image: redis:7-alpine
    container_name: nexus-mausoleum-mock
    command: redis-server --port 7777
    expose:
      - "7777"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7777", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ============================================================================
  # Mock Tome - Redis for caching
  # ============================================================================
  tome-mock:
    image: redis:7-alpine
    container_name: nexus-tome-mock
    command: redis-server --port 6379
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ============================================================================
  # Nexus - Real Ritz HTTP Server!
  # ============================================================================
  nexus:
    image: alpine:latest
    container_name: nexus-app
    ports:
      - "8080:8080"
    volumes:
      - ../build/debug/nexus:/app/nexus:ro
    command: ["/app/nexus"]
    depends_on:
      mausoleum-mock:
        condition: service_healthy
      tome-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3
