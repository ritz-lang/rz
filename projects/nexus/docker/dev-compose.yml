# Nexus Development Compose
#
# Development setup with real Nexus + Mausoleum binaries!
#
# Usage:
#   # Build both first
#   ./rz build nexus && ./rz build mausoleum
#
#   # Then run with docker compose
#   cd projects/nexus/docker
#   docker compose -f dev-compose.yml up -d
#
#   # Seed initial wiki pages (first time only):
#   docker compose -f dev-compose.yml run --rm wiki-seed --seed
#
#   # Access the wiki:
#   curl http://localhost:8080/
#   curl http://localhost:8080/wiki/welcome
#
# Data persistence:
#   Wiki data is stored in a Docker volume (mausoleum-data)
#   To wipe data: docker volume rm docker_mausoleum-data

services:
  # ============================================================================
  # Mausoleum - Document Database (real binary!)
  # ============================================================================
  mausoleum:
    image: ubuntu:22.04
    container_name: nexus-mausoleum
    volumes:
      - ../../mausoleum/build/debug/mausoleum:/app/mausoleum:ro
      - mausoleum-data:/data
    command: ["/app/mausoleum", "serve", "--port", "7777", "--data-dir", "/data", "--no-encryption"]
    ports:
      - "7777:7777"
    # Graceful shutdown with SIGTERM (fixed in GitHub #72)
    stop_grace_period: 10s
    # Unencrypted mode for development - Nexus uses plain TCP client
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/7777' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  # ============================================================================
  # Wiki Seed - Seeds initial wiki pages into Mausoleum
  # ============================================================================
  wiki-seed:
    image: ubuntu:22.04
    container_name: nexus-wiki-seed
    volumes:
      - ../../mausoleum/build/debug/wiki-seed:/app/wiki-seed:ro
    # Note: wiki-seed doesn't support DNS names yet, so we resolve the IP first
    command:
      - bash
      - -c
      - |
        sleep 2
        IP=$$(getent hosts mausoleum | awk '{print $$1}')
        echo "Resolved mausoleum to: $$IP"
        /app/wiki-seed --host "$$IP" --port 7777 --seed
    depends_on:
      mausoleum:
        condition: service_healthy
    profiles:
      - seed  # Only run with: docker compose --profile seed up

  # ============================================================================
  # Mock Tome - Redis for caching (until tome is ready)
  # ============================================================================
  tome-mock:
    image: redis:7-alpine
    container_name: nexus-tome-mock
    command: redis-server --port 6379
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ============================================================================
  # Nexus - Real Ritz HTTP Server!
  # ============================================================================
  nexus:
    image: ubuntu:22.04
    container_name: nexus-app
    ports:
      - "8080:8080"
    volumes:
      - ../build/debug/nexus:/app/nexus:ro
    command: ["/app/nexus"]
    # io_uring requires privileged mode or specific seccomp settings
    privileged: true
    environment:
      - MAUSOLEUM_HOST=mausoleum
      - MAUSOLEUM_PORT=7777
    depends_on:
      - mausoleum
      - tome-mock

# Named volumes for data persistence
volumes:
  mausoleum-data:
    driver: local
