# Nexus Wiki - Docker Compose
#
# Full Ritz stack:
# - Mausoleum: Document database (port 7777 internal)
# - Nexus: Wiki app with Valet HTTP (port 8080 external)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Access: http://10.0.0.191:8080/

services:
  # ============================================================================
  # Document Database - Mausoleum
  # ============================================================================
  mausoleum:
    image: ubuntu:22.04
    container_name: nexus-mausoleum
    working_dir: /app
    command: /app/mausoleum serve --port 7777 --data-dir /data --no-encryption
    volumes:
      - ../../../projects/mausoleum/build/debug/mausoleum:/app/mausoleum:ro
      - nexus-data:/data
    ports:
      - "0.0.0.0:7777:7777"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7777'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s
    restart: unless-stopped

  # ============================================================================
  # Wiki Application - Nexus (with Valet HTTP server)
  # ============================================================================
  nexus:
    image: ubuntu:22.04
    container_name: nexus-app
    working_dir: /app
    command: /app/nexus
    volumes:
      - ../build/debug/nexus:/app/nexus:ro
      - ../deploy/certs:/certs:ro
    ports:
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:8443:8443"
    # Required for io_uring syscalls used by Valet's async server
    privileged: true
    # Increase stack size to handle deep crypto call chains
    ulimits:
      stack:
        soft: 16777216  # 16MB
        hard: 16777216
    environment:
      # Connect to mausoleum via bridge gateway (172.17.0.1)
      # TODO: Add DNS resolution to ritzlib.net for proper Docker networking
      - MAUSOLEUM_HOST=172.17.0.1
      - MAUSOLEUM_PORT=7777
      - NEXUS_PORT=8443
      # TLS config
      - TLS_CERT=/certs/cert.pem
      - TLS_KEY=/certs/key.pem
    depends_on:
      mausoleum:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  nexus-data:
    driver: local
