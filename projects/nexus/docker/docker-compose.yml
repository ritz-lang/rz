# Nexus Docker Compose - Ghetto Mode
#
# Phase 0: Minimal viable deployment
# - Mausoleum: Document storage (TCP server)
# - Tome: In-memory cache (TCP server)
# - Nexus: Wiki app with embedded HTTP (TODO)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down

version: '3.8'

services:
  # ============================================================================
  # Document Database - Mausoleum
  # ============================================================================
  mausoleum:
    build:
      context: ../../mausoleum
      dockerfile: ../nexus/docker/Dockerfile.mausoleum
    container_name: nexus-mausoleum
    expose:
      - "7777"
    volumes:
      - nexus-data:/data
    environment:
      - M7M_DATA_PATH=/data/nexus.m7m
      - M7M_PORT=7777
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7777"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # In-Memory Cache - Tome
  # ============================================================================
  tome:
    build:
      context: ../../tome
      dockerfile: ../nexus/docker/Dockerfile.tome
    container_name: nexus-tome
    expose:
      - "6379"
    environment:
      - TOME_PORT=6379
      - TOME_MAX_MEMORY=256MB
      - TOME_EVICTION=allkeys-lru
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6379"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Wiki Application - Nexus
  # ============================================================================
  nexus:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nexus
    container_name: nexus-app
    ports:
      - "8080:8080"
    environment:
      - NEXUS_PORT=8080
      - MAUSOLEUM_HOST=mausoleum
      - MAUSOLEUM_PORT=7777
      - TOME_HOST=tome
      - TOME_PORT=6379
    depends_on:
      mausoleum:
        condition: service_healthy
      tome:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  nexus-data:
    driver: local
