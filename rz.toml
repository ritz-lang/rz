[workspace]
name = "ritz-ecosystem"
version = "0.1.0"
description = "Ritz programming language ecosystem monorepo"

# All projects in the workspace
members = [
    "projects/*",
]

# Default build settings
[build]
cache = true
parallel = true
max_jobs = 8

# Agent coordination settings
[agents]
lock_timeout_ms = 30000
claim_ttl_seconds = 600
