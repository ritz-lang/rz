name: Main Branch Validation
on:
  push:
    branches: [main]

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install llvmlite

      - name: Install LLVM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld

      - name: Build Ritz runtime objects
        run: make -C projects/ritz/runtime

      - name: Set up RITZ_PATH
        run: echo "RITZ_PATH=$PWD/projects" >> $GITHUB_ENV

      - name: Build all projects
        run: |
          for proj in projects/*/; do
            if [ -f "$proj/Makefile" ]; then
              echo "=== Building $(basename $proj) ==="
              (cd "$proj" && make build) || exit 1
            fi
          done

  test-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install llvmlite

      - name: Install LLVM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld

      - name: Build Ritz runtime objects
        run: make -C projects/ritz/runtime

      - name: Set up RITZ_PATH
        run: echo "RITZ_PATH=$PWD/projects" >> $GITHUB_ENV

      - name: Test all projects
        run: |
          for proj in projects/*/; do
            if [ -f "$proj/Makefile" ]; then
              echo "=== Testing $(basename $proj) ==="
              (cd "$proj" && make test) || exit 1
            fi
          done

  lint-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run ritz-lint on all
        run: |
          if [ -f projects/larb/tools/ritz-lint/ritz_lint.py ]; then
            python projects/larb/tools/ritz-lint/ritz_lint.py projects/
          fi
