name: PR Validation
on: [pull_request]

jobs:
  affected:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find affected projects
        id: find
        run: |
          # Find changed projects
          changed=$(git diff --name-only origin/main | \
            grep "^projects/" | \
            cut -d/ -f2 | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "projects=$changed" >> $GITHUB_OUTPUT
          echo "Affected projects: $changed"

  test:
    needs: affected
    if: needs.affected.outputs.projects != '[]'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.affected.outputs.projects) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up RITZ_PATH
        run: echo "RITZ_PATH=$PWD/projects" >> $GITHUB_ENV

      - name: Build
        run: |
          cd projects/${{ matrix.project }}
          if [ -f Makefile ]; then
            make build
          else
            echo "No Makefile found, skipping build"
          fi

      - name: Test
        run: |
          cd projects/${{ matrix.project }}
          if [ -f Makefile ]; then
            make test
          else
            echo "No Makefile found, skipping test"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ritz-lint
        run: |
          if [ -f projects/larb/tools/ritz-lint/ritz_lint.py ]; then
            python projects/larb/tools/ritz-lint/ritz_lint.py projects/
          else
            echo "ritz-lint not found, skipping"
          fi
